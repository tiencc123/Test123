<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thủ Kho - Quản Lý Luân Chuyển</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light">
    <div id="loginArea" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0">
                <h3 class="text-center text-dark mb-4">🏢 Quản Lý Trạm (Hub)</h3>
                <input type="number" id="idIn" class="form-control mb-3" placeholder="Mã Thủ kho">
                <input type="text" id="nameIn" class="form-control mb-3" placeholder="Họ tên">
                <button class="btn btn-dark w-100" onclick="login()">Đăng Nhập</button>
            </div>
        </div>
    </div>

    <div id="mainArea" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-dark">
            <div>
                <h4 class="mb-0 text-dark">Kho: <span id="uHubName"></span></h4>
                <small>Thủ kho: <span id="uName"></span></small>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Thoát</button>
        </div>

        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white fw-bold d-flex justify-content-between align-items-center">
                        <span>📤 Xuất Hàng Đi Tỉnh Khác</span>
                        <button class="btn btn-sm btn-light" onclick="loadInventory() && loadTruckers()">🔄 Tải lại</button>
                    </div>
                    <div class="card-body">
                        <div class="d-flex gap-2 mb-3">
                            <select id="truckerSelect" class="form-select border-primary">
                                <option value="">-- Chọn Xe tải đang rảnh (Thuộc kho này) --</option>
                            </select>
                            <button class="btn btn-primary text-nowrap" onclick="dispatchTruck()">🚀 Cho xe xuất phát</button>
                        </div>
                        <h6 class="text-muted border-bottom pb-2">Hàng đang chờ luân chuyển:</h6>
                        <div class="list-group mt-2" id="inventoryList">
                            </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-danger text-white fw-bold">📥 Đón Xe Tải Đến Kho</div>
                    <div class="card-body d-flex flex-column">
                        <button class="btn btn-outline-danger w-100 mb-3" onclick="loadIncoming()">Tải lại danh sách xe đang đến</button>
                        <div class="list-group flex-grow-1 overflow-auto" id="incomingList">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let staffData = null;

        async function login() {
            const id = document.getElementById('idIn').value;
            const name = document.getElementById('nameIn').value;
            if(!id || !name) return alert("Vui lòng nhập đủ thông tin!");

            try {
                const res = await fetch('/api/staff/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ id, name })
                });
                const result = await res.json();
                if(result.success) { 
                    staffData = result.user; 
                    renderUI(); 
                } else alert(result.message);
            } catch (e) { alert("Lỗi kết nối Server!"); }
        }

        function renderUI() {
            if(!staffData) return;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mainArea').classList.remove('hidden');
            document.getElementById('uHubName').innerText = staffData.HubName || 'Kho không xác định';
            document.getElementById('uName').innerText = staffData.FullName;
            
            loadInventory(); 
            loadTruckers(); 
            loadIncoming();
        }

        async function loadInventory() {
    const res = await fetch(`/api/staff/inventory/${staffData.HubID}`);
    const result = await res.json();
    const list = document.getElementById('inventoryList');
    
    if(result.data.length === 0) {
        list.innerHTML = '<div class="alert alert-secondary text-center">Kho hiện tại đang trống.</div>';
        return;
    }

    list.innerHTML = '';
    result.data.forEach(i => {
        // Kiểm tra xem có phải hàng đi tỉnh khác (cần Trucker) không
        const isInterProvincial = i.RoutingType.includes('Trucker');
        
        list.innerHTML += `
            <div class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded border-start border-4 ${isInterProvincial ? 'border-primary' : 'border-success'}">
                <div>
                    <b class="text-dark">${i.OrderName}</b> <small>(${i.TrackingNumber})</small><br>
                    <small>Phân loại: <span class="badge ${isInterProvincial ? 'bg-primary' : 'bg-success'}">${i.RoutingType}</span></small><br>
                    <small>Đích: ${i.DestinationProvince} (Hub ${i.DestinationHubID})</small>
                </div>
                ${isInterProvincial ? 
                    `<button class="btn btn-sm btn-primary" onclick="loadToTruck('${i.TrackingNumber}')">Bốc lên xe tải</button>` : 
                    `<span class="badge bg-light text-dark border">Chờ Courier lấy</span>`
                }
            </div>`;
    });
}

        async function loadTruckers() {
            // Truyền HubID lên Server để lọc xe tải thuộc kho này
            const res = await fetch(`/api/staff/available-truckers/${staffData.HubID}`);
            const result = await res.json();
            const select = document.getElementById('truckerSelect');
            
            select.innerHTML = '<option value="">-- Chọn Xe tải đang rảnh (Thuộc kho này) --</option>';
            if(result.data.length === 0) {
                select.innerHTML = '<option value="">-- Không có xe tải nào đang rảnh --</option>';
            } else {
                result.data.forEach(t => {
                    select.innerHTML += `<option value="${t.EmployeeID}">${t.LicensePlate} (Tải trọng: ${t.MaxPayload}kg) - LX: ${t.FullName}</option>`;
                });
            }
        }

        async function loadToTruck(trackingNum) {
            const truckerId = document.getElementById('truckerSelect').value;
            if(!truckerId) return alert("Vui lòng chọn Xe tải ở ô thả xuống trước khi bốc hàng!");
            
            const res = await fetch('/api/staff/load', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ trackingNumber: trackingNum, truckerId: truckerId })
            });
            const result = await res.json();
            alert(result.message); 
            if(result.success) loadInventory();
        }

        async function dispatchTruck() {
    const truckerSelect = document.getElementById('truckerSelect');
    const truckerId = truckerSelect.value;
    
    if(!truckerId) return alert("Vui lòng chọn xe tải để xuất phát!");
    
    const res = await fetch('/api/staff/dispatch', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ truckerId })
    });
    const result = await res.json();
    alert(result.message);
    
    if(result.success) {
        truckerSelect.value = ''; 
        loadTruckers();
    }
}

        async function loadIncoming() {
            const res = await fetch(`/api/staff/incoming-trucks/${staffData.HubID}`);
            const result = await res.json();
            const list = document.getElementById('incomingList');
            
            if(result.data.length === 0) {
                list.innerHTML = '<div class="p-4 text-center text-muted">Chưa có xe tải nào đang hướng đến kho này.</div>';
                return;
            }

            list.innerHTML = '';
            result.data.reverse().forEach(t => {
                list.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center bg-light">
                        <div>
                            <b class="text-danger">Biển số: ${t.LicensePlate}</b><br>
                            <small class="text-muted">Tài xế: ${t.FullName}</small>
                        </div>
                        <button class="btn btn-danger btn-sm shadow-sm" onclick="receiveTruck('${t.EmployeeID}')">Dỡ hàng & Nhập kho</button>
                    </div>`;
            });
        }

        async function receiveTruck(truckerId) {
            const res = await fetch('/api/staff/receive-truck', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ truckerId, staffId: staffData.EmployeeID, hubId: staffData.HubID })
            });
            const result = await res.json();
            alert(result.message);
            if(result.success) loadIncoming();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
