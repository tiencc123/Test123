<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khách Hàng - Gửi Hàng Nhanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hidden { display: none !important; }
        .timeline { list-style: none; padding-left: 1.5rem; position: relative; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #0d6efd; }
        .timeline li { position: relative; margin-bottom: 15px; padding-left: 15px; }
        .timeline li::before { content: ''; position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: #0d6efd; border: 2px solid #fff; }
        .item-row { background: #fdfdfd; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 10px; position: relative;}
        .remove-item { position: absolute; top: 5px; right: 10px; cursor: pointer; color: #dc3545; font-weight: bold; font-size: 0.9rem;}
    </style>
</head>
<body>
    <div id="loginArea" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0 rounded-4">
                <h3 class="text-center text-primary mb-4">👋 Đăng Nhập</h3>
                <input type="text" id="phoneIn" class="form-control form-control-lg mb-3" placeholder="Nhập SĐT của bạn">
                <button class="btn btn-primary btn-lg w-100" onclick="login()">Vào Hệ Thống</button>
            </div>
        </div>
    </div>

    <div id="mainArea" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-primary">
            <div>
                <h4 class="mb-0 text-primary">Khách hàng: <span id="uName" class="fw-bold"></span></h4>
                <small class="text-muted">Trung tâm quản lý vận đơn</small>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Đăng xuất</button>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white fw-bold">📦 Lên đơn hàng mới</div>
                    <div class="card-body">
                        <form id="orderForm">
                            <div class="row mb-2">
                                <div class="col-8"><input type="text" id="orderName" class="form-control fw-bold" placeholder="Tên đơn (VD: Gửi quà Sinh nhật)" required></div>
                                <div class="col-4"><input type="number" id="cod" class="form-control" placeholder="Thu hộ COD" value="0"></div>
                            </div>
                            <hr>
                            
                            <h6 class="text-muted">1. Thông tin Người Nhận</h6>
                            <div class="row mb-2">
                                <div class="col"><input type="text" id="recvName" class="form-control" placeholder="Tên người nhận" required></div>
                                <div class="col"><input type="text" id="recvPhone" class="form-control" placeholder="SĐT người nhận" required></div>
                            </div>
                            
                            <h6 class="text-muted mt-3">2. Nơi Giao Hàng (Đích đến)</h6>
                            <div class="row mb-3">
                                <div class="col-5"><input type="text" id="province" class="form-control border-primary" placeholder="Tỉnh/Thành phố (VD: Hà Nội)" required></div>
                                <div class="col-7"><input type="text" id="addr" class="form-control border-primary" placeholder="Số nhà, đường, phường/xã..." required></div>
                            </div>
                            <hr>
                            
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="text-muted mb-0">3. Hàng hóa bên trong</h6>
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="addNewItemRow()">+ Thêm món</button>
                            </div>
                            <div id="itemsContainer"></div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold mt-3">XÁC NHẬN GỬI ĐƠN</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white fw-bold">📋 Đơn hàng liên quan đến bạn</div>
                    <div class="card-body d-flex flex-column">
                        <div class="input-group mb-3">
                            <input type="text" id="searchMyOrders" class="form-control" placeholder="🔍 Tìm theo Tên đơn hàng...">
                            <button class="btn btn-dark" onclick="loadMyOrders()">TÌM</button>
                        </div>
                        
                        <div class="list-group flex-grow-1 overflow-auto mb-3" id="myOrdersList" style="max-height: 250px;"></div>

                        <div id="trackResult" class="hidden border-top pt-3">
                            <h6 class="fw-bold text-primary">Mã: <span id="rTracking"></span></h6>
                            <div class="alert alert-info p-2 mb-3" style="font-size: 0.9rem;">
                                <b>Người nhận:</b> <span id="rRecv"></span> <br>
                                <b>Hàng gồm:</b> <span id="rItemsList" class="fw-bold text-dark"></span> <br>
                                <b>Phí Ship (Hệ thống tính):</b> <span id="rFee" class="text-danger fw-bold"></span>
                            </div>
                            <h6 class="fw-bold">Nhật ký hành trình:</h6>
                            <ul class="timeline mt-3 mb-0" id="logList"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let customerData = null;

        // 1. KHỞI TẠO & ĐĂNG NHẬP
        window.onload = async () => {
            const saved = localStorage.getItem('customerSession');
            if (saved) { customerData = JSON.parse(saved); renderUI(); }
        };

        async function login() {
            const phone = document.getElementById('phoneIn').value;
            if (!phone) return alert("Vui lòng nhập SĐT!");
            try {
                const res = await fetch('/api/customer/login-customer', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone })
                });
                const result = await res.json();
                if (result.success) {
                    customerData = result.user;
                    localStorage.setItem('customerSession', JSON.stringify(customerData));
                    renderUI();
                } else alert(result.message);
            } catch (error) { alert("Lỗi kết nối Server!"); }
        }

        function renderUI() {
            if (!customerData) return;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mainArea').classList.remove('hidden');
            document.getElementById('uName').innerText = customerData.FullName;
            
            loadMyOrders();
            document.getElementById('itemsContainer').innerHTML = ''; 
            addNewItemRow(); 
        }

        // 2. XỬ LÝ THÊM NHIỀU MÓN HÀNG
        let itemCount = 0;
        function addNewItemRow() {
            itemCount++;
            const container = document.getElementById('itemsContainer');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.id = `itemRow_${itemCount}`;
            div.innerHTML = `
                ${itemCount > 1 ? `<span class="remove-item" onclick="document.getElementById('itemRow_${itemCount}').remove()">✖ Xóa</span>` : ''}
                <div class="row mb-2 mt-2">
                    <div class="col-8"><input type="text" class="form-control i-name" placeholder="Tên món hàng..." required></div>
                    <div class="col-4"><input type="number" class="form-control i-amount" placeholder="Số lượng" value="1" required></div>
                </div>
                <div class="row">
                    <div class="col-4"><input type="number" step="0.1" class="form-control i-weight" placeholder="Nặng (kg)" required></div>
                    <div class="col-4"><input type="text" class="form-control i-size" placeholder="DxRxC" value="10x10x10"></div>
                    <div class="col-4"><input type="text" class="form-control i-type" placeholder="Loại hàng" value="Thường"></div>
                </div>
            `;
            container.appendChild(div);
        }

        // 3. XỬ LÝ GỬI ĐƠN HÀNG
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();

            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    name: row.querySelector('.i-name').value,
                    amount: row.querySelector('.i-amount').value,
                    weight: row.querySelector('.i-weight').value,
                    dimensions: row.querySelector('.i-size').value,
                    type: row.querySelector('.i-type').value
                });
            });

            const data = {
                orderName: document.getElementById('orderName').value,
                codAmount: document.getElementById('cod').value || 0,
                receiverName: document.getElementById('recvName').value,
                receiverPhone: document.getElementById('recvPhone').value,
                province: document.getElementById('province').value,
                detailAddress: document.getElementById('addr').value,
                // Chặn lỗi undefined khóa ngoại
                senderId: customerData.CustomerID || customerData.customerid || customerData.id || null,
                items: items
            };

            try {
                const res = await fetch('/api/customer/create-order', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.success) {
                    alert("✅ Tạo đơn thành công! Mã tự tạo: " + result.trackingNumber);
                    e.target.reset();
                    document.getElementById('itemsContainer').innerHTML = '';
                    addNewItemRow();
                    loadMyOrders(); 
                } else alert("❌ Lỗi: " + result.message);
            } catch (error) { alert("Lỗi hệ thống khi gửi yêu cầu!"); }
        };

        // 4. QUẢN LÝ ĐƠN HÀNG CỦA TÔI
        async function loadMyOrders() {
            const q = document.getElementById('searchMyOrders').value;
            const safeId = customerData.CustomerID || customerData.customerid || customerData.id;
            const res = await fetch(`/api/customer/my-orders/${safeId}?search=${q}`);
            const result = await res.json();
            
            const list = document.getElementById('myOrdersList');
            list.innerHTML = '';
            
            if (result.data.length === 0) {
                list.innerHTML = `<div class="text-center text-muted p-3">Chưa có đơn hàng nào liên quan.</div>`;
                return;
            }

            result.data.forEach(order => {
                const date = new Date(order.CreatedDate).toLocaleDateString('vi-VN');
                list.innerHTML += `
                    <a href="#" class="list-group-item list-group-item-action" onclick="viewOrderDetails('${order.TrackingNumber}')">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 text-primary">${order.OrderName} <small class="text-muted">(${order.TrackingNumber})</small></h6>
                            <small>${date}</small>
                        </div>
                        <small class="text-muted">Phí ship: ${Number(order.ShippingFee).toLocaleString()}đ</small>
                    </a>
                `;
            });
        }

        // 5. XEM CHI TIẾT 1 ĐƠN (HÀNH TRÌNH)
        async function viewOrderDetails(trackingNumber) {
            const res = await fetch(`/api/customer/track/${trackingNumber}`);
            const result = await res.json();

            if (result.success) {
                document.getElementById('trackResult').classList.remove('hidden');
                document.getElementById('rTracking').innerText = result.order.TrackingNumber;
                document.getElementById('rRecv').innerText = `${result.order.Receiver} - ${result.order.DeliveryAddress}`;
                document.getElementById('rFee').innerText = Number(result.order.ShippingFee).toLocaleString() + " VNĐ";
                
                let itemsStr = result.items.map(i => `${i.NameItem} (x${i.amounts}, ${i.Weight}kg)`).join(' + ');
                document.getElementById('rItemsList').innerText = itemsStr;

                const logList = document.getElementById('logList');
                logList.innerHTML = '';
                result.logs.forEach(log => {
                    const dateObj = new Date(log.UpdateTimestamp);
                    const timeString = `${dateObj.toLocaleDateString('vi-VN')} ${dateObj.toLocaleTimeString('vi-VN')}`;
                    logList.innerHTML += `
                        <li>
                            <strong class="text-dark">${log.StatusDescription}</strong><br>
                            <small class="text-muted">${timeString}</small>
                        </li>
                    `;
                });
            }
        }

        // 6. ĐĂNG XUẤT
        function logout() {
            localStorage.removeItem('customerSession');
            location.reload();
        }
    </script>
</body>
</html>
