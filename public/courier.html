<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Courier - Lấy & Giao Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light">
    <div id="loginArea" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0">
                <h3 class="text-center text-success mb-4">🛵 App Tài Xế</h3>
                <input type="number" id="idIn" class="form-control mb-3" placeholder="Mã NV (VD: 9)">
                <input type="text" id="nameIn" class="form-control mb-3" placeholder="Họ tên">
                <button class="btn btn-success w-100" onclick="login()">Đăng Nhập</button>
            </div>
        </div>
    </div>

    <div id="mainArea" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-success">
            <div>
                <h4 class="mb-0 text-success">Tài xế: <span id="uName"></span></h4>
                <small class="text-muted">Khu vực hoạt động: Trạm <b id="uHub"></b></small>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Thoát</button>
        </div>

        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-success text-white fw-bold d-flex justify-content-between">
                        <span>🔔 Việc Cần Làm</span>
                        <button class="btn btn-sm btn-light" onclick="loadData()">🔄 Tải lại</button>
                    </div>
                    <div class="list-group list-group-flush" id="taskList"></div>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-warning text-dark fw-bold">📦 Hàng Trên Xe Của Tôi</div>
                    <div class="list-group list-group-flush" id="bagList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let courierData = null;

        async function login() {
            const res = await fetch('/api/courier/login', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ id: document.getElementById('idIn').value, name: document.getElementById('nameIn').value })
            });
            const result = await res.json();
            if(result.success) {
                courierData = result.user; renderUI();
            } else alert(result.message);
        }

        function renderUI() {
            if(!courierData) return;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mainArea').classList.remove('hidden');
            document.getElementById('uName').innerText = courierData.FullName;
            document.getElementById('uHub').innerText = courierData.HubID;
            loadData();
        }

        async function loadData() {
            // Tải Việc cần làm
            const r1 = await fetch(`/api/courier/tasks/${courierData.HubID}`);
            const tasks = await r1.json();
            const tList = document.getElementById('taskList');
            tList.innerHTML = tasks.data.length ? '' : '<div class="p-3 text-muted text-center">Không có việc mới</div>';
            
            tasks.data.forEach(t => {
                let isPickup = t.TaskType.includes('Lấy');
                let badge = isPickup ? 'bg-primary' : 'bg-danger';
                let acceptAction = isPickup ? 'pickup' : 'delivery'; 
                
                tList.innerHTML += `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between">
                            <h6 class="mb-1 fw-bold">${t.TrackingNumber} <span class="badge ${badge}">${t.TaskType}</span></h6>
                            <button class="btn btn-sm btn-success" onclick="acceptTask('${t.TrackingNumber}', '${acceptAction}')">Nhận việc</button>
                        </div>
                        <small>Khách: ${t.CustomerName} - ${t.CustomerPhone}</small><br>
                        <small>Đ/c: <b>${t.TaskAddress}</b></small>
                    </div>`;
            });

            // Tải Hàng trên xe
            const r2 = await fetch(`/api/courier/my-bag/${courierData.EmployeeID}`);
            const bag = await r2.json();
            const bList = document.getElementById('bagList');
            bList.innerHTML = bag.data.length ? '' : '<div class="p-3 text-muted text-center">Xe đang trống</div>';
            
            bag.data.forEach(b => {
                // LOGIC CHUẨN: Kiểm tra LastLog để biết là đơn Giao hay Lấy
                let isDelivery = b.LastLog && b.LastLog.includes('Đang giao'); 
                
                let btnTxt = isDelivery ? 'Giao Khách Xong' : 'Nhập Về Kho';
                let btnCol = isDelivery ? 'btn-danger' : 'btn-primary';
                let action = isDelivery ? 'success' : 'inbound';
                
                bList.innerHTML += `
                    <div class="list-group-item bg-light border-bottom">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0 text-dark fw-bold">${b.OrderName}</h6>
                                <small class="text-muted">Mã: ${b.TrackingNumber}</small>
                            </div>
                            <button class="btn btn-sm ${btnCol}" onclick="completeTask('${b.TrackingNumber}', '${action}')">${btnTxt}</button>
                        </div>
                    </div>`;
            });
        }

        async function acceptTask(id, action) {
            await fetch('/api/courier/accept', { 
                method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ trackingNumber: id, driverId: courierData.EmployeeID, actionType: action }) 
            });
            loadData();
        }

        async function completeTask(id, action) {
            await fetch('/api/courier/complete', { 
                method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ trackingNumber: id, driverId: courierData.EmployeeID, actionType: action }) 
            });
            loadData();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
