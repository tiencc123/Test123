<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khách Hàng - Gửi Hàng Nhanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hidden { display: none !important; }
        .timeline { list-style: none; padding-left: 1.5rem; position: relative; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #0d6efd; }
        .timeline li { position: relative; margin-bottom: 15px; padding-left: 15px; }
        .timeline li::before { content: ''; position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: #0d6efd; border: 2px solid #fff; }
        .item-row { background: #fdfdfd; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 10px; position: relative;}
        .remove-item { position: absolute; top: 5px; right: 10px; cursor: pointer; color: #dc3545; font-weight: bold; font-size: 0.9rem;}
    </style>
</head>
<body>

    <div id="mainArea" class="container mt-4">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-primary">
            <div>
                <h4 class="mb-0 text-primary">Khách hàng: <span id="uName" class="fw-bold">Nguyễn Anh Tuấn</span></h4>
                <small class="text-muted">Trung tâm quản lý vận đơn</small>
            </div>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.location.reload()">Làm mới trang</button>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white fw-bold">📦 Lên đơn hàng mới</div>
                    <div class="card-body">
                        <form id="orderForm">
