<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Courier - Lấy & Giao Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light">
    <div id="loginArea" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0">
                <h3 class="text-center text-success mb-4">🛵 App Tài Xế</h3>
                <input type="number" id="idIn" class="form-control mb-3" placeholder="Mã NV (VD: 9)">
                <input type="text" id="nameIn" class="form-control mb-3" placeholder="Họ tên">
                <button class="btn btn-success w-100" onclick="login()">Đăng Nhập</button>
            </div>
        </div>
    </div>

    <div id="mainArea" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-success">
            <div>
                <h4 class="mb-0 text-success">Tài xế: <span id="uName"></span></h4>
                <small class="text-muted">Khu vực hoạt động: Trạm <b id="uHub"></b></small>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Thoát</button>
        </div>

        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-success text-white fw-bold d-flex justify-content-between">
                        <span>🔔 Việc Cần Làm</span>
                        <button class="btn btn-sm btn-light" onclick="loadData()">🔄 Tải lại</button>
                    </div>
                    <div class="list-group list-group-flush" id="taskList"></div>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-warning text-dark fw-bold">📦 Hàng Trên Xe Của Tôi</div>
                    <div class="list-group list-group-flush" id="bagList"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
