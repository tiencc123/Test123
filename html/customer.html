<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khách Hàng - Gửi Hàng Nhanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hidden { display: none !important; }
        .timeline { list-style: none; padding-left: 1.5rem; position: relative; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #0d6efd; }
        .timeline li { position: relative; margin-bottom: 15px; padding-left: 15px; }
        .timeline li::before { content: ''; position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: #0d6efd; border: 2px solid #fff; }
        .item-row { background: #fdfdfd; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 10px; position: relative;}
        .remove-item { position: absolute; top: 5px; right: 10px; cursor: pointer; color: #dc3545; font-weight: bold; font-size: 0.9rem;}
    </style>
</head>
<body>
    <div id="loginArea" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 border-0 rounded-4">
                <h3 class="text-center text-primary mb-4">👋 Đăng Nhập</h3>
                <input type="text" id="phoneIn" class="form-control form-control-lg mb-3" placeholder="Nhập SĐT của bạn">
                <button class="btn btn-primary btn-lg w-100" onclick="login()">Vào Hệ Thống</button>
            </div>
        </div>
    </div>

    <div id="mainArea" class="container mt-4 hidden">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border-start border-4 border-primary">
            <div>
                <h4 class="mb-0 text-primary">Khách hàng: <span id="uName" class="fw-bold"></span></h4>
                <small class="text-muted">Trung tâm quản lý vận đơn</small>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Đăng xuất</button>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white fw-bold">📦 Lên đơn hàng mới</div>
                    <div class="card-body">
                        <form id="orderForm">
                            <div class="row mb-2">
                                <div class="col-8"><input type="text" id="orderName" class="form-control fw-bold" placeholder="Tên đơn (VD: Gửi quà Sinh nhật)" required></div>
                                <div class="col-4"><input type="number" id="cod" class="form-control" placeholder="Thu hộ COD" value="0"></div>
                            </div>
                            <hr>
                            
                            <h6 class="text-muted">1. Thông tin Người Nhận</h6>
                            <div class="row mb-2">
                                <div class="col"><input type="text" id="recvName" class="form-control" placeholder="Tên người nhận" required></div>
                                <div class="col"><input type="text" id="recvPhone" class="form-control" placeholder="SĐT người nhận" required></div>
                            </div>
                            
                            <h6 class="text-muted mt-3">2. Nơi Giao Hàng (Đích đến)</h6>
                            <div class="row mb-3">
                                <div class="col-5"><input type="text" id="province" class="form-control border-primary" placeholder="Tỉnh/Thành phố (VD: Hà Nội)" required></div>
                                <div class="col-7"><input type="text" id="addr" class="form-control border-primary" placeholder="Số nhà, đường, phường/xã..." required></div>
                            </div>
                            <hr>
                            
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="text-muted mb-0">3. Hàng hóa bên trong</h6>
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="addNewItemRow()">+ Thêm món</button>
                            </div>
                            <div id="itemsContainer"></div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold mt-3">XÁC NHẬN GỬI ĐƠN</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white fw-bold">📋 Đơn hàng liên quan đến bạn</div>
                    <div class="card-body d-flex flex-column">
                        <div class="input-group mb-3">
                            <input type="text" id="searchMyOrders" class="form-control" placeholder="🔍 Tìm theo Tên đơn hàng...">
                            <button class="btn btn-dark" onclick="loadMyOrders()">TÌM</button>
                        </div>
                        
                        <div class="list-group flex-grow-1 overflow-auto mb-3" id="myOrdersList" style="max-height: 250px;"></div>

                        <div id="trackResult" class="hidden border-top pt-3">
                            <h6 class="fw-bold text-primary">Mã: <span id="rTracking"></span></h6>
                            <div class="alert alert-info p-2 mb-3" style="font-size: 0.9rem;">
                                <b>Người nhận:</b> <span id="rRecv"></span> <br>
                                <b>Hàng gồm:</b> <span id="rItemsList" class="fw-bold text-dark"></span> <br>
                                <b>Phí Ship (Hệ thống tính):</b> <span id="rFee" class="text-danger fw-bold"></span>
                            </div>
                            <h6 class="fw-bold">Nhật ký hành trình:</h6>
                            <ul class="timeline mt-3 mb-0" id="logList"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
